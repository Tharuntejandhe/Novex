# Builds Novex and runs its test suite on every push / PR.
# Note: Novex uses a dependency-free test runner (the `NovexDevTests` executable),
# NOT XCTest — so we run `swift run NovexDevTests`, not `swift test`.
name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: swift build
    - name: Run tests (dependency-free runner)
      run: swift run NovexDevTests
