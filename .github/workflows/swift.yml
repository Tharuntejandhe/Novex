# Builds Crux and runs its test suite on every push / PR.
# Note: Crux uses a dependency-free test runner (the `CruxDevTests` executable),
# NOT XCTest — so we run `swift run CruxDevTests`, not `swift test`.
name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: swift build
    - name: Run tests (dependency-free runner)
      run: swift run CruxDevTests
